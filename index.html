<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 15px; display: inline-block; width: 80%; max-width: 400px; box-shadow: 0px 0px 10px #ccc; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📥 داگرتنی ڤیدیۆ</h1>
        <input type="text" id="url" placeholder="لینکەکە لێرە دابنێ...">
        <button onclick="window.location.href='https://snapsave.app/?url='+document.getElementById('url').value">داگرتن</button>
    </div>
</body>
</html>
