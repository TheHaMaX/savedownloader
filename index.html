<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داگرتنی ڤیدیۆی سۆشیاڵ میدیا - بە خۆڕایی</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 داگرتنی ڤیدیۆی سۆشیاڵ میدیا</h1>
        <p>لینکەکە لێرە دابنێ و ڤیدیۆکەت بە کوالێتی بەرز دابگرە</p>
        <input type="text" id="url" placeholder="لینکەکە لێرە دابنێ...">
        <button onclick="window.open('https://snapsave.app/?url='+document.getElementById('url').value, '_blank')">داگرتن</button>
    </div>
</body>
</html>
